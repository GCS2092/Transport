services:
  - type: web
    name: wendd-transport-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production

      # ── Base de données (copier depuis Render Dashboard → PostgreSQL → Internal URL) ──
      - key: DATABASE_URL
        sync: false

      # ── JWT ───────────────────────────────────────────────────────────────────────
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      # ── CORS ──────────────────────────────────────────────────────────────────────
      - key: FRONTEND_URL
        value: https://transport-six-xi.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://transport-six-xi.vercel.app

      # ── Email Gmail SMTP ──────────────────────────────────────────────────────────
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_FROM_NAME
        value: "VTC Dakar"

      # ── Admin initial ─────────────────────────────────────────────────────────────
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # ── Optionnel ─────────────────────────────────────────────────────────────────
      - key: WHATSAPP_SUPPORT_NUMBER
        sync: false
      - key: SENTRY_DSN
        value: ""
